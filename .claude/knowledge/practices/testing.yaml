_meta:
  id: practice-testing
  type: doc
  title: "Best practice — Testing"
  summary: Outcomes-driven testing — a test is a claim about behavior. Enumerate every distinct outcome (success/failure/edge/security), pick the right kind of test, and review suites for the gaps that matter.
  sensitivity: internal
  read_scope: brain.read
  tags: [practice, engineering, testing, init, feature, review]
  updated: 2026-05-30

practice:
  id: testing
  title: Testing
  domain: engineering
  activities: [feature, review]
  matched_skills:
    - /test-suite-developer
  use_when: >-
    You're adding tests for a feature, building a test suite, or reviewing
    whether existing tests actually exercise the behaviors the code promises.

  inputs_to_gather_first:
    - The spec / expected behavior for the surface under test (test from the spec, not the code).
    - The boundaries that matter — auth, money, external deps, anything that's broken before.
    - Whether a real test DB is available (prefer it over mocking the database for integration tests).

  methodology:
    - Treat each test as a claim about behavior ("when the caller does X with state Y, Z happens"). If you can't phrase it that way, you don't know what you're testing yet.
    - Write from the spec, not the implementation — mirroring the code freezes its bugs in.
    - Enumerate the outcomes across the axes (happy path, validation, authn, authz, state, concurrency, external-dep failure, side effects, security, invariants, regression anchors), then write one test per distinct outcome and parametrize over inputs.
    - Pick the right kind: unit for pure logic, integration for routes/DB/services (real test DB), component for UI state, E2E (Playwright) only for golden paths + top 2–3 critical failures.
    - Verify mocks are actually called; a test that never fails is not a test.

  questions:
    - id: surface
      prompt: "What surface are we testing, and what's its expected behavior from the spec?"
      why: Tests derive from intended behavior; without the spec you'll just mirror the code.
    - id: criticality
      prompt: "What are the high-stakes paths here — auth, payments, data integrity, anything that's broken before?"
      why: Those get the deepest coverage (and possibly E2E); low-stakes surfaces get less.
    - id: realdb
      prompt: "Is there a real test database available, or do we mock persistence?"
      why: Integration tests should hit a real test DB when possible; mocking the DB hides integration bugs.

  review_checklist:
    - Happy path covered for each entry point, asserting an observable outcome (not just that code ran).
    - Every validation rule and every error/non-2xx branch has a test.
    - Authn (unauthenticated, expired) and authz (wrong owner, IDOR) boundaries tested.
    - State preconditions covered (empty, not-found, already-exists, stale cache).
    - Concurrency where it matters (duplicate submit, race, idempotency on retry).
    - External dependency failures simulated (timeout, 5xx, malformed, rate limit).
    - Side effects asserted (email/webhook/row/event happened or didn't).
    - Security boundaries probed (injection, SSRF, traversal, mass assignment, secret leakage).
    - No flakiness-prone patterns (unmocked time, randomness, order-dependence, leaked state).

  references:
    - ../../knowledge/checklists/testing-strategy.md
    - ../../knowledge/stack/jest.md
    - ../../knowledge/stack/playwright.md

  output:
    destination: "Tests in the repo (colocated *.test.ts for unit; tests/ for integration/e2e)."
    format: markdown
    template: |
      # Test plan — <surface>

      ## Outcomes to cover
      | Axis | Outcome | Test |
      |------|---------|------|
      | happy path | … | … |
      | validation | … | … |
      | authz | … | … |
      | failure | … | … |
      | security | … | … |

      ## Kind of test
      <Unit / integration / component / e2e — and why, per area.>

      ## Gaps deferred
      <Anything intentionally not tested and why.>
