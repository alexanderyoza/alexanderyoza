_meta:
  id: practice-auth
  type: doc
  title: "Best practice — Authentication"
  summary: How to plan, build, and review authentication — provider choice, the data model, session/redirect handling, and the security failure modes to check on any auth diff.
  sensitivity: internal
  read_scope: brain.read
  tags: [practice, engineering, auth, security, init, feature, review]
  updated: 2026-05-30

practice:
  id: auth
  title: Authentication
  domain: engineering
  activities: [init, feature, review]
  matched_skills:
    - /code-review
  use_when: >-
    You're choosing an auth provider, implementing sign-up / login / session
    handling, or reviewing a diff that touches authentication, sessions,
    redirects, or access control.

  inputs_to_gather_first:
    - Platforms in scope — web only, or web + mobile? (Drives the provider choice.)
    - Whether OAuth providers (Google/Apple) are needed, and whether there's public registration or admin-only access.
    - The existing user model and how records link to the auth provider.

  methodology:
    - Pick the provider from the decision doc — Stytch for web+mobile, Firebase Auth for web-only speed, Auth.js when you want full control. Don't roll your own.
    - Model the user with a real `id` + `email` plus a `providerUid` to link to the provider, even though the provider owns the credential.
    - Handle session and the `return_to` redirect carefully — validate redirects against relative paths only; never trust an absolute URL from the client.
    - Treat OAuth + provider callback wiring as the part that's always harder than it looks; test the full round-trip.
    - Implement a return-to-origin pattern so a user bounced to login lands back where they started.

  questions:
    - id: platforms
      prompt: "Web only, or web + mobile? Native apps too?"
      why: Stytch covers web+mobile uniformly; Firebase Auth is faster for web-only. The answer picks the provider.
    - id: methods
      prompt: "Which sign-in methods — email magic link, OTP, Google, Apple, password?"
      why: Determines provider config, callbacks, and the test matrix.
    - id: registration
      prompt: "Public registration, or restricted (e.g. admin-only allowlist)?"
      why: Admin-only auth (like japanbyalex) has a very different surface than open signup.
    - id: post_auth
      prompt: "Where should users land after login, and do you need return-to-origin after a bounce?"
      why: Redirect handling is the most common source of auth bugs.

  review_checklist:
    - Auth check happens before business logic on every protected route; authz/ownership check before acting on a resource (no IDOR).
    - Redirects validated against relative paths only — no open redirect via a client-supplied `return_to`/`next`.
    - Session cookies are HttpOnly, Secure, SameSite; tokens expire and can be revoked; session rotates on privilege change.
    - Passwords (if any) hashed with a strong algorithm; login/reset throttled against brute force.
    - OAuth callback verifies state; the provider uid links to the local user record correctly (no account takeover via email collision).
    - No secrets, tokens, or session ids logged.
    - Account-collision / verify-and-switch path handled when the same email arrives via a second provider.

  references:
    - ../../knowledge/checklists/auth-setup.md
    - ../../knowledge/stack/auth-decision.md
    - ../../knowledge/checklists/security-basics.md

  output:
    destination: "<repo>/docs/auth-spec.md (or a section of architecture-spec.md)"
    format: markdown
    template: |
      # <Product> — Auth

      ## Provider & methods
      <Provider chosen + why; sign-in methods enabled.>

      ## Data model
      <User model, providerUid linkage, session storage.>

      ## Flows
      ### Sign-up / login
      ### OAuth callback (state + account linking)
      ### Return-to-origin after bounce
      ### Sign-out / session expiry

      ## Source-of-truth decisions
      <Who owns identity, where sessions live, redirect-allowlist rule.>

      ## Security checklist
      <The review_checklist items, confirmed for this implementation.>
