# {{APP_NAME}} pipeline — Pipeline by Alex (pba).
#
# This ONE declarative file is the whole CI + deploy definition. It is read at
# runtime by the central pipelinebyalex interpreter; the only other file is the
# thin caller at .github/workflows/ci.yml (templates/ci-caller.yml). To change
# what runs, edit THIS file — never the generated workflow YAML.
# Reference: AGY-LLC/pipelinebyalex docs/usage.md.
#
# ── Repo shape (user-facing monorepo) ───────────────────────────────────────
#   marketing/   Next.js marketing site   → {{APP_DOMAIN}}        (apex)
#   web/         Next.js FULL-STACK app    → app.{{APP_DOMAIN}}    (UI + API/server)
#   app/         Expo/RN mobile (optional) → app stores; uses web/'s API
# web/ is the server too (Vercel runs its API routes/route handlers), so the
# Prisma schema + migrations live in web/. Remove the `app` bits if web-only;
# remove `marketing` if this isn't a user-facing product.
#
# ── Branching ────────────────────────────────────────────────────────────────
#   main     = production, protected, intentional (deploys to prod)
#   staging  = the working line; all dev happens here / on branches off it,
#              deploys to the staging environment; promoted to main when prod-ready
#
# Scaffold note: components/gates/ci below run green immediately. The deploy
# `targets` + `deploy` chains are stubbed — fill in domains / Vercel project IDs
# and uncomment per branch once the deploy secrets + environments exist. Until
# then CI runs; nothing deploys.
version: 1
name: {{APP_NAME}}

defaults:
  node: 24
  pnpm: 10.12.4

# ── components: the things that get built/tested (one CI job each) ──────────
components:
  marketing:
    dir: marketing
    language: node
    steps: [install, typecheck, lint, test, build]
  web:
    dir: web
    language: node
    # web/ owns the schema (it's the server), so generate + migrate live here.
    steps: [install, prisma-generate, typecheck, lint, test, build]
    env:
      # Job-level env for the test step. The central test job provisions Postgres
      # as DB `app_test`; point the suite at it and seed stable dummy secrets so a
      # failure is about test logic, not env drift. Add the app's own required vars.
      test:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
        DIRECT_URL: postgresql://postgres:postgres@localhost:5432/app_test
        NEXT_PUBLIC_APP_URL: http://localhost:3000
  # ── Mobile (only if the project has an Expo/RN app) ─────────────────────────
  # app:
  #   dir: app
  #   language: node
  #   mobile: true
  #   steps: [install, typecheck, test]

# ── gates: extra blocking checks beyond the per-component jobs ──────────────
gates:
  # HIGH/CRITICAL CVE gate on prod dependencies of every workspace.
  audit:
    type: pnpm-audit
    level: high
    dirs: [marketing, web]
  # schema.prisma ↔ migrations drift (shadow DB provided by the central job).
  prisma-drift:
    type: prisma-drift
    dir: web

# ── which branches trigger CI ───────────────────────────────────────────────
ci:
  push: [main, staging]
  pull_request: [main, staging]

# ── deploy targets (defined once, referenced per branch) ────────────────────
# Two Vercel projects (one per surface) + Prisma migrations for web/. Turn OFF
# each Vercel project's own git integration (vercel.json deploymentEnabled:false)
# so CI owns the gated deploy. Each project's Root Directory is set to its dir in
# the Vercel dashboard, so the CLI runs from repo root (dir: "."). Secrets:
# VERCEL_TOKEN, VERCEL_ORG_ID, and a per-project VERCEL_PROJECT_ID.
targets:
  # ── Marketing site → apex domain ────────────────────────────────────────────
  # marketing-staging:
  #   type: vercel
  #   mode: cli
  #   dir: "."
  #   project: marketing
  #   target: staging
  #   environment: staging
  # marketing-prod:
  #   type: vercel
  #   mode: cli
  #   dir: "."
  #   project: marketing
  #   target: production
  #   environment: production
  #   health: "https://{{APP_DOMAIN}}"

  # ── web/ Prisma migrations (run before the web deploy that needs them) ──────
  # migrate-staging:
  #   type: prisma-migrate
  #   dir: web
  #   environment: staging
  # migrate-prod:
  #   type: prisma-migrate
  #   dir: web
  #   environment: production
  #   health: "https://app.{{APP_DOMAIN}}/api/health"

  # ── Web app → app.{{APP_DOMAIN}} (full-stack: serves UI + API) ──────────────
  # web-staging:
  #   type: vercel
  #   mode: cli
  #   dir: "."
  #   project: web
  #   target: staging
  #   environment: staging
  #   health: "https://staging.app.{{APP_DOMAIN}}/api/health"
  # web-prod:
  #   type: vercel
  #   mode: cli
  #   dir: "."
  #   project: web
  #   target: production
  #   environment: production
  #   health: "https://app.{{APP_DOMAIN}}/api/health"

  # ── Mobile (independent EAS release; see app component above) ───────────────
  # eas-prod:
  #   type: eas
  #   dir: app
  #   profile: production
  #   platform: all
  #   environment: production

# ── per-branch deploy chains (order IS the needs chain) ─────────────────────
# A chain runs only after its needs_ci jobs are green; `order` runs sequentially,
# each gated on the previous. main = production, staging = the staging env.
# Uncomment once the `targets` above are filled in.
# deploy:
#   staging:
#     needs_ci: [marketing, web, audit, prisma-drift]
#     order: [marketing-staging, migrate-staging, web-staging]
#   main:
#     needs_ci: [marketing, web, audit, prisma-drift]
#     order: [marketing-prod, migrate-prod, web-prod]
