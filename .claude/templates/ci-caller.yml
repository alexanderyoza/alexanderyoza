# CI — thin caller. ALL pipeline logic lives in the central reusable workflow
# (AGY-LLC/pipelinebyalex); this repo's pipeline is declared in pba.yml, read at
# runtime. To change what runs, edit pba.yml — NOT this file.
# Reference: AGY-LLC/pipelinebyalex docs/usage.md.
#
# Install: write this to .github/workflows/ci.yml. The interpreter is pinned at
# @v1 (a mutable major tag); pin a full SHA for zero blast radius if needed.
name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    uses: AGY-LLC/pipelinebyalex/.github/workflows/pipeline.yml@v1
    secrets: inherit
